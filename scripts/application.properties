# ====================================================
# Database Configuration
# ====================================================

jdbc.driverClassName=com.mysql.jdbc.Driver
jdbc.url=jdbc:mysql://<DATABASE_HOST>:3306/accounts?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull
jdbc.username=<DATABASE_USERNAME>
jdbc.password=<DATABASE_PASSWORD>


# ====================================================
# Memcached Configuration
# ====================================================

# Active Host
memcached.active.host=<MEMCACHED_HOST>
memcached.active.port=11211

# Standby Host
memcached.standBy.host=<MEMCACHED_STANDBY_HOST>
memcached.standBy.port=11211


# ====================================================
# RabbitMQ Configuration
# ====================================================

rabbitmq.address=<RABBITMQ_HOST>
rabbitmq.port=5672
rabbitmq.username=<RABBITMQ_USERNAME>
rabbitmq.password=<RABBITMQ_PASSWORD>


# ====================================================
# Elasticsearch Configuration
# ====================================================

elasticsearch.host=<ELASTICSEARCH_HOST>
elasticsearch.port=9300
elasticsearch.cluster=<CLUSTER_NAME>
elasticsearch.node=<NODE_NAME>
